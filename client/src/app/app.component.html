<mat-toolbar *ngIf="!isMobile">
  <a routerLink="/" class="app-title-link">
    <span>{{ title }}</span>
  </a>

  <a mat-button routerLink="/">Map</a>
  <a mat-button routerLink="/globe">Globe</a>
  <a mat-button routerLink="/compare">Compare</a>
  <a mat-button routerLink="/seasons">Seasons</a>
  <a mat-button routerLink="/climate-predictions">Climate Predictions</a>
  <a mat-button routerLink="/climate-scenarios">Climate Scenarios</a>
  <a mat-button routerLink="/climate-matrix">Climate Matrix</a>
  <a mat-button routerLink="/stories">Stories</a>
  <a mat-button routerLink="/upload" class="upload-tab">
    <mat-icon class="tab-icon">cloud_upload</mat-icon>
    Upload
  </a>
  <a mat-button routerLink="/compare-nc" class="upload-tab">
    <mat-icon class="tab-icon">compare_arrows</mat-icon>
    Compare NC
  </a>

  <span class="spacer"></span>

  <a mat-button routerLink="/about">About</a>
  <a
    mat-icon-button
    href="https://github.com/bartromgens/climatemaps"
    target="_blank"
    aria-label="GitHub"
  >
    <mat-icon svgIcon="github"></mat-icon>
  </a>
  <button
    mat-icon-button
    (click)="themeService.toggle()"
    [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    class="theme-toggle-button"
  >
    <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button
    mat-icon-button
    [matMenuTriggerFor]="settingsMenu"
    aria-label="Settings"
    class="settings-button"
  >
    <mat-icon>settings</mat-icon>
  </button>

  <mat-menu #settingsMenu="matMenu">
    <div
      class="settings-menu-content"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
      tabindex="0"
    >
      <div class="settings-section">
        <span class="settings-label">Temperature Unit</span>
        <app-temperature-unit-selector></app-temperature-unit-selector>
      </div>
      <div class="settings-section">
        <span class="settings-label">Precipitation Unit</span>
        <app-precipitation-unit-selector></app-precipitation-unit-selector>
      </div>
      <div class="settings-section">
        <span class="settings-label">Theme</span>
        <button
          mat-button
          (click)="themeService.toggle()"
          class="theme-menu-button"
        >
          <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
          {{ themeService.theme() === 'dark' ? 'Light Mode' : 'Dark Mode' }}
        </button>
      </div>
    </div>
  </mat-menu>
</mat-toolbar>

<router-outlet></router-outlet>
