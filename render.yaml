# Render Blueprint — https://docs.render.com/blueprint-spec
# Deploy: connect this repo on Render Dashboard → "New Blueprint Instance"

services:
  # ── Backend API (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: climatego-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: TILE_SERVER_URL
        sync: false  # Set manually — your CDN/S3 tile URL
      - key: API_BASE_URL
        value: /v1
      - key: CORS_ORIGINS
        sync: false  # Set manually — your frontend URL, e.g. https://climatego.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: climate-data
      mountPath: /app/data
      sizeGB: 10  # Adjust based on your tile + raw data size

  # ── Frontend (Angular Static Site) ──────────────────────────────────────
  - type: web
    name: climatego-client
    runtime: static
    buildCommand: cd client && npm install && npm run build:render
    staticPublishPath: client/dist/client/browser
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        sync: false  # Set manually — e.g. https://climatego-api.onrender.com/v1
      - key: NODE_VERSION
        value: "20"
